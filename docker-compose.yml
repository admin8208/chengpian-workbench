services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chengpian
      POSTGRES_USER: chengpian
      POSTGRES_PASSWORD: \
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chengpian"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: python apps/api/run_api.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CHENGPIAN_DATABASE_URL: postgresql+psycopg://chengpian:\@postgres:5432/chengpian
      CHENGPIAN_REDIS_URL: redis://redis:6379/0
      CHENGPIAN_API_HOST: "0.0.0.0"
      CHENGPIAN_API_PORT: "8010"
      CHENGPIAN_RELOAD: "0"
      CHENGPIAN_EXPOSE_DOCS: "1"
      CHENGPIAN_DATA_DIR: /app/data
    ports:
      - "8010:8010"
    volumes:
      - data:/app/data

  worker:
    build: .
    command: python apps/api/run_worker.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CHENGPIAN_DATABASE_URL: postgresql+psycopg://chengpian:\@postgres:5432/chengpian
      CHENGPIAN_REDIS_URL: redis://redis:6379/0
      CHENGPIAN_DATA_DIR: /app/data
    volumes:
      - data:/app/data

volumes:
  pgdata:
  redisdata:
  data:
